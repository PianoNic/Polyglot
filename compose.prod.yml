name: polyglot

# Production stack. Pangolin (running separately on the VPS) terminates TLS and
# proxies the public domains to `frontend` (app) and `pocket-id` (auth) over the
# external network. nginx in `frontend` proxies /api to the backend, so the SPA
# and API share one origin.
#
# All configuration lives in .env (copy it from .env.example): every service reads
# it via env_file, so this file holds no inline environment values.

services:
  frontend:
    build:
      context: ./src/Polyglot.Frontend
    container_name: polyglot-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - pangolin

  api:
    build:
      context: ./src
      dockerfile: Polyglot.API/Dockerfile
    container_name: polyglot-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    networks:
      - internal
    healthcheck:
      # The aspnet base image ships no curl/wget; bash with /dev/tcp does the job.
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:18.3
    container_name: polyglot-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      # $$ defers expansion to the container shell, where POSTGRES_DB is set from .env.
      test: ["CMD-SHELL", "pg_isready -U postgres -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v1
    container_name: polyglot-pocket-id
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pocket-id-data:/app/data
    networks:
      - internal
      - pangolin
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:1411/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: polyglot-seaweedfs
    restart: unless-stopped
    env_file:
      - .env
    # SeaweedFS reads its S3 identities from a config file rather than env vars,
    # so generate that file from the same env keys (single source of truth in
    # .env), then run the all-in-one server with the S3 gateway on :9000 so the
    # Backup__S3__Endpoint stays http://seaweedfs:9000.
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<JSON
        {"identities":[{"name":"polyglot","credentials":[{"accessKey":"$${SEAWEEDFS_ACCESS_KEY}","secretKey":"$${SEAWEEDFS_SECRET_KEY}"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
        JSON
        exec weed server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json -s3.port=9000
    volumes:
      - seaweedfs-data:/data
    networks:
      - internal

volumes:
  postgres-data:
  pocket-id-data:
  seaweedfs-data:

networks:
  internal:
  pangolin:
    external: true
    name: pangolin
