name: polyglot

# Production stack. Pangolin (running separately on the VPS) terminates TLS and
# proxies the public domains to `frontend` (app) and `keycloak` (auth) over the
# external network. nginx in `frontend` proxies /api to the backend, so the SPA
# and API share one origin.
#
# Most configuration lives in .env (copy it from .env.example): services read it
# via env_file, and the keycloak/keycloak-db services read a few values through
# ${...} substitution (docker compose reads .env for that automatically).

services:
  frontend:
    build:
      context: ./src/Polyglot.Frontend
    container_name: polyglot-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - internal
      - pangolin

  api:
    build:
      context: ./src
      dockerfile: Polyglot.API/Dockerfile
    container_name: polyglot-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    networks:
      - internal

  db:
    image: postgres:18.3
    container_name: polyglot-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    build: ./keycloak
    container_name: polyglot-keycloak
    restart: unless-stopped
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
    depends_on:
      keycloak-db:
        condition: service_healthy
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    networks:
      - internal
      - pangolin

  keycloak-db:
    image: postgres:18.3
    container_name: polyglot-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: polyglot-seaweedfs
    restart: unless-stopped
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<JSON
        {"identities":[{"name":"polyglot","credentials":[{"accessKey":"$${SEAWEEDFS_ACCESS_KEY}","secretKey":"$${SEAWEEDFS_SECRET_KEY}"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
        JSON
        exec weed server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json -s3.port=9000
    volumes:
      - seaweedfs-data:/data
    networks:
      - internal

volumes:
  postgres-data:
  keycloak-db-data:
  seaweedfs-data:

networks:
  internal:
  pangolin:
    external: true
    name: pangolin
